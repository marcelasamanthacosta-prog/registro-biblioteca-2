<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- ════════════════════════════════
       CABEÇALHO
  ════════════════════════════════ -->
  <header>
    <h1>Sistema de Biblioteca</h1>
  </header>


  <!-- ════════════════════════════════
       MENU DE NAVEGAÇÃO
       Cada botão chama a função navegar()
       passando o nome da página
  ════════════════════════════════ -->
  <nav>
    <button id="btn-leitor" onclick="navegar('leitor')" class="ativo">Leitor</button>
    <button id="btn-livro" onclick="navegar('livro')">Livro</button>
    <button id="btn-autor" onclick="navegar('autor')">Autor</button>
    <button id="btn-editora" onclick="navegar('editora')">Editora</button>
  </nav>


  <!-- ════════════════════════════════
       PÁGINA: LEITOR
  ════════════════════════════════ -->
  <div id="pagina-leitor" class="pagina ativa">
    <div class="container">
      <h2>Cadastro de Leitor</h2>
      <div class="campo">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" placeholder="Digite o nome do leitor">
      </div>
      <div class="campo">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">
      </div>
    <div class="campo">
        <label for="nascimento">Data De Nascimento</label>
        <input type="date" id="nascimento">
  </div>


  <!-- ════════════════════════════════
       PÁGINA: LIVRO (a ser criada pelos alunos)
  ════════════════════════════════ -->
  <div id="pagina-livro" class="pagina">
    <div class="container">
      <h2>Cadastro de Livro</h2>
      <p style="color: #888; font-size: 0.9rem;">Página a ser desenvolvida.</p>
    </div>
  </div>


  <!-- ════════════════════════════════
       PÁGINA: AUTOR (a ser criada pelos alunos)
  ════════════════════════════════ -->
  <div id="pagina-autor" class="pagina">
    <div class="container">
      <h2>Cadastro de Autor</h2>
      <p style="color: #888; font-size: 0.9rem;">Página a ser desenvolvida.</p>
    </div>
  </div>


  <!-- ════════════════════════════════
       PÁGINA: EDITORA (a ser criada pelos alunos)
  ════════════════════════════════ -->
  <div id="pagina-editora" class="pagina">
    <div class="container">
      <h2>Cadastro de Editora</h2>
      <p style="color: #888; font-size: 0.9rem;">Página a ser desenvolvida.</p>
    </div>
  </div>


  <!-- ════════════════════════════════
       JAVASCRIPT
  ════════════════════════════════ -->
  <script src="script.js"></script>

</body>

</html>
